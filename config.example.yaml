# PostgreSQL Resource Provisioning Configuration
# Format: YAML

host: localhost
port: 5432
user: postgres
password: your_admin_password
database: myapp_prod
environment: standalone  # standalone, qa, or prod

schemas:
  - myapp
  - ext

roles:
  - name: myapp_prod_dba
    password: DBAxxxxx
    type: dba
    conn_limit: 10
  
  - name: myapp_prod_app
    password: APPxxxxx
    type: app
    conn_limit: -1  # unlimited
  
  - name: myapp_prod_ro
    password: ROxxxxx
    type: ro
    conn_limit: 10

extensions:
  - uuid-ossp
  - pg_trgm
  - hstore

grants:
  - usage
  - select
  - insert
  - update
  - delete
  - execute

search_path: myapp, ext

# Set to true to see what would happen without making changes
dry_run: false
